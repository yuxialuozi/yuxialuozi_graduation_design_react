<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#dd6b20"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 建筑主体 -->
  <rect x="8" y="12" width="16" height="14" rx="1" fill="#fff" opacity="0.95"/>
  <!-- 屋顶 -->
  <polygon points="6,13 16,5 26,13" fill="url(#accent)"/>
  <!-- 窗户 -->
  <rect x="11" y="15" width="4" height="4" rx="0.5" fill="url(#accent)"/>
  <rect x="17" y="15" width="4" height="4" rx="0.5" fill="url(#accent)"/>
  <!-- 门 -->
  <rect x="13.5" y="21" width="5" height="5" rx="0.5" fill="#1a365d"/>
  <!-- 门把手 -->
  <circle cx="17" cy="23.5" r="0.6" fill="#ed8936"/>
</svg>